<svg width="100%" height="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep space (100% width/height) -->
  <rect width="100%" height="100%" fill="#0a0a1a" />

  <!-- Stars (circles with percentage-based positions/radii) -->
  <circle cx="25%" cy="20%" r="1.5%" fill="#ffecf5" stroke="#ffffff" stroke-width="0.25%" />
  <circle cx="75%" cy="15%" r="1%" fill="#a8d8ff" stroke="#ffffff" stroke-width="0.2%" />
  <circle cx="50%" cy="50%" r="2%" fill="#fffacd" stroke="#ffd700" stroke-width="0.3%" />
  <circle cx="20%" cy="70%" r="1.2%" fill="#ffb6c1" stroke="#ffffff" stroke-width="0.2%" />
  <circle cx="80%" cy="65%" r="1.8%" fill="#e6e6fa" stroke="#ffffff" stroke-width="0.25%" />
  <circle cx="40%" cy="80%" r="0.8%" fill="#ffdab9" stroke="#ffffff" stroke-width="0.15%" />
  <circle cx="60%" cy="30%" r="1.5%" fill="#ffecf5" stroke="#ffffff" stroke-width="0.25%" stroke-dasharray="0.5%, 0.5%" />

  <!-- Constellation lines (percentage-based coordinates and stroke) -->
  <line x1="25%" y1="20%" x2="75%" y2="15%" stroke="#f7fff7" stroke-width="0.3%" stroke-dasharray="0.5%, 0.3%" />
  <line x1="75%" y1="15%" x2="50%" y2="50%" stroke="#f7fff7" stroke-width="0.2%" />
  <line x1="50%" y1="50%" x2="20%" y2="70%" stroke="#f7fff7" stroke-width="0.4%" stroke-dasharray="0.2%, 0.3%" />
  <line x1="20%" y1="70%" x2="80%" y2="65%" stroke="#f7fff7" stroke-width="0.25%" />
  <line x1="80%" y1="65%" x2="40%" y2="80%" stroke="#f7fff7" stroke-width="0.2%" stroke-dasharray="0.8%, 0.4%" />
  <line x1="40%" y1="80%" x2="60%" y2="30%" stroke="#f7fff7" stroke-width="0.15%" />
  <line x1="60%" y1="30%" x2="25%" y2="20%" stroke="#f7fff7" stroke-width="0.3%" stroke-dasharray="1%, 0.5%" />

  <!-- Twinkling effect (animated opacity for one star) -->
  <circle cx="10%" cy="50%" r="2%" fill="#fffacd" stroke="#ffd700" stroke-width="0.3%">
    <animate attributeName="opacity" values="1;0.2;0.8;0.4" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>