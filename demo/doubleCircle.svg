<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Baseline: no pathLength -->
  <circle cx="60" cy="100" r="40" fill="rosybrown" stroke="blue" stroke-width="8" stroke-dasharray="20 10"/>

  <!-- Same circle, but pathLength="100" -->
  <circle cx="140" cy="100" r="40" pathLength="100" fill="palegoldenrod" stroke="red" stroke-width="8" stroke-dasharray="20 10"/>
</svg>