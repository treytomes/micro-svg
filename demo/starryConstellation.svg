<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (optional) -->
  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Stars (circles) -->
  <circle cx="100" cy="100" r="20" fill="#ff6b6b" stroke="#ffffff" stroke-width="3" />
  <circle cx="300" cy="80" r="15" fill="#4ecdc4" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,3" />
  <circle cx="200" cy="200" r="25" fill="#ffe66d" stroke="#ff9f1c" stroke-width="4" />
  <circle cx="150" cy="300" r="10" fill="#a55eea" stroke="#ffffff" stroke-width="1" />
  <circle cx="320" cy="280" r="18" fill="#26de81" stroke="#ffffff" stroke-width="3" stroke-dasharray="10,5" pathLength="100" />

  <!-- Connecting lines (constellation) -->
  <line x1="100" y1="100" x2="300" y2="80" stroke="#f7fff7" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="300" y1="80" x2="200" y2="200" stroke="#f7fff7" stroke-width="1" />
  <line x1="200" y1="200" x2="150" y2="300" stroke="#f7fff7" stroke-width="3" stroke-dasharray="2,3" />
  <line x1="150" y1="300" x2="320" y2="280" stroke="#f7fff7" stroke-width="2" stroke-dasharray="8,4" pathLength="50" />
  <line x1="320" y1="280" x2="100" y2="100" stroke="#f7fff7" stroke-width="1" stroke-dasharray="1,2" />
</svg>